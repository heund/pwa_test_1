<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Light Fixture Test</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
    }

    body {
      overflow: hidden;
      background: #f7f7f3;
    }

    .light-stage {
      position: fixed;
      inset: 0;
      overflow: hidden;
    }

    .light-fixture {
      position: absolute;
      left: 50%;
      top: 50%;
      width: min(72vw, 420px);
      aspect-ratio: 1;
      --light-x: 41.67%;
      --light-y: 69.64%;
      transform: translate(calc(-1 * var(--light-x)), calc(-1 * var(--light-y)));
    }

    .light-fixture::before {
      content: "";
      position: absolute;
      z-index: 2;
      left: calc(var(--light-x) - 48%);
      top: calc(var(--light-y) - 44%);
      width: 96%;
      height: 88%;
      border-radius: 42%;
      background:
        radial-gradient(ellipse at 50% 50%, rgba(58, 54, 49, 0.18), rgba(20, 18, 17, 0.22) 52%, rgba(8, 7, 7, 0.1) 76%, transparent 90%);
      filter: blur(28px);
      opacity: 0.42;
      transform: scale(1.06);
      animation: fog-clear 3.8s ease-in-out infinite;
      pointer-events: none;
      mix-blend-mode: multiply;
    }

    .light-fixture img {
      position: absolute;
      inset: 0;
      display: block;
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .light-fixture__body,
    .light-fixture__handle,
    .light-fixture__paper {
      pointer-events: none;
    }

    .light-fixture__swing {
      position: absolute;
      inset: 0;
      z-index: 1;
      transform-origin: 50% 17%;
      animation: fixture-swing 7.8s ease-in-out infinite;
    }

    .light-fixture__body {
      z-index: 1;
    }

    .light-fixture__glow {
      position: absolute;
      z-index: 3;
      left: var(--light-x);
      top: var(--light-y);
      width: 52%;
      height: 58%;
      border-radius: 50%;
      background:
        radial-gradient(circle, rgba(255, 252, 184, 1) 0%, rgba(255, 229, 58, 0.98) 24%, rgba(255, 190, 38, 0.78) 50%, rgba(255, 133, 42, 0.32) 70%, rgba(255, 160, 48, 0) 86%);
      filter: blur(22px);
      mix-blend-mode: screen;
      transform: translate(-50%, -50%);
      animation: light-breathe 3.8s ease-in-out infinite;
    }

    .light-fixture__motes {
      position: absolute;
      z-index: 999;
      left: var(--light-x);
      top: var(--light-y);
      width: 1px;
      height: 1px;
      pointer-events: none;
    }

    .light-fixture__mote {
      position: absolute;
      left: var(--x);
      top: var(--y);
      width: var(--size);
      height: var(--size);
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255, 255, 255, 1), rgba(255, 250, 214, 0.88) 48%, rgba(255, 230, 134, 0.28) 68%, transparent 78%);
      filter: blur(0.1px);
      box-shadow: 0 0 10px rgba(255, 245, 190, 0.72);
      opacity: 0;
      transform: translate3d(0, 0, 0) scale(0.55);
      animation: mote-float var(--duration) ease-out infinite;
      animation-delay: var(--delay);
    }

    .light-fixture__paper {
      z-index: 4;
      opacity: 0.52;
    }

    @keyframes light-breathe {
      0%,
      100% {
        opacity: 0.72;
        transform: translate(-50%, -50%) scale(0.9);
        filter: blur(20px);
      }

      50% {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1.16);
        filter: blur(28px);
      }
    }

    @keyframes fog-clear {
      0%,
      100% {
        opacity: 0.5;
        filter: blur(34px);
        transform: scale(1.08);
      }

      50% {
        opacity: 0.13;
        filter: blur(16px);
        transform: scale(1);
      }
    }

    @keyframes fixture-swing {
      0%,
      100% {
        transform: rotate(-2deg);
      }

      50% {
        transform: rotate(2deg);
      }
    }

    @keyframes mote-float {
      0% {
        opacity: 0;
        transform: translate3d(0, 0, 0) scale(0.55);
      }

      18% {
        opacity: 0.95;
      }

      68% {
        opacity: 0.78;
      }

      100% {
        opacity: 0;
        transform: translate3d(var(--drift-x), var(--drift-y), 0) scale(1.12);
      }
    }

  </style>
</head>
<body>
  <main class="light-stage" aria-label="light fixture asset test">
    <div class="light-fixture">
      <img class="light-fixture__handle" src="images/light-handle-only.svg" alt="">
      <div class="light-fixture__swing">
        <img class="light-fixture__body" src="images/light-body-only.svg" alt="">
        <div class="light-fixture__glow" aria-hidden="true"></div>
        <div class="light-fixture__motes" aria-hidden="true">
          <span class="light-fixture__mote" style="--x:-4px; --y:-8px; --size:13px; --drift-x:-26px; --drift-y:-132px; --duration:7.2s; --delay:-0.8s;"></span>
          <span class="light-fixture__mote" style="--x:8px; --y:4px; --size:10px; --drift-x:28px; --drift-y:-118px; --duration:7.8s; --delay:-2.6s;"></span>
          <span class="light-fixture__mote" style="--x:-12px; --y:10px; --size:14px; --drift-x:-14px; --drift-y:-150px; --duration:8.4s; --delay:-4.4s;"></span>
          <span class="light-fixture__mote" style="--x:15px; --y:-10px; --size:11px; --drift-x:16px; --drift-y:-142px; --duration:7.5s; --delay:-1.7s;"></span>
          <span class="light-fixture__mote" style="--x:0px; --y:14px; --size:10px; --drift-x:-32px; --drift-y:-124px; --duration:8.8s; --delay:-5.2s;"></span>
          <span class="light-fixture__mote" style="--x:-28px; --y:2px; --size:11px; --drift-x:-42px; --drift-y:-136px; --duration:8.1s; --delay:-3.4s;"></span>
          <span class="light-fixture__mote" style="--x:-36px; --y:18px; --size:9px; --drift-x:-30px; --drift-y:-112px; --duration:7.6s; --delay:-6.1s;"></span>
          <span class="light-fixture__mote" style="--x:-22px; --y:-18px; --size:12px; --drift-x:-50px; --drift-y:-158px; --duration:8.9s; --delay:-2.1s;"></span>
        </div>
        <img class="light-fixture__paper" src="images/light-paper.svg" alt="">
      </div>
    </div>
  </main>
</body>
</html>
