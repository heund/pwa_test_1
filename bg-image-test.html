<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Background Image Test</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@700;900&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
    }

    body {
      overflow: hidden;
      background: #0f1010;
      --hud-margin: 20px;
      --level-size: clamp(64px, 17vw, 76px);
      --secondary-menu-height: 42px;
      --hud-gold: #b79d5f;
      --secondary-menu-lantern-reserve: calc(var(--level-size) * 0.46);
      --secondary-menu-content-padding: 18px;
      --secondary-menu-width: clamp(300px, 80vw, 365px);
    }

    .image-stage {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: var(--app-height, 100vh);
      overflow: hidden;
    }

    .image-stage__image {
      position: absolute;
      inset: 0;
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center center;
      user-select: none;
      -webkit-user-drag: none;
    }

    .lantern-group {
      position: absolute;
      left: var(--lantern-x, 50%);
      top: var(--lantern-y, 50%);
      z-index: 3;
      width: min(42vw, 240px);
      aspect-ratio: 1;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }

    .lantern-group::before {
      content: "";
      position: absolute;
      inset: 16% 10% 6%;
      z-index: 0;
      background:
        radial-gradient(ellipse at 50% 58%, rgba(0, 0, 0, 0.28), rgba(0, 0, 0, 0.08) 48%, transparent 72%);
      filter: blur(14px);
      transform: translateY(8px);
      pointer-events: none;
    }

    body.is-calibrating .lantern-group {
      touch-action: none;
      cursor: grab;
      pointer-events: auto;
    }

    body.is-calibrating .lantern-group.is-dragging {
      cursor: grabbing;
    }

    .lantern-group img {
      position: absolute;
      inset: 0;
      display: block;
      width: 100%;
      height: 100%;
      object-fit: contain;
      user-select: none;
      pointer-events: none;
      -webkit-user-drag: none;
    }

    .lantern-group__body {
      z-index: 1;
      filter: brightness(0.88) contrast(0.86) saturate(0.82) blur(0.25px);
    }

    .lantern-group__windows {
      z-index: 2;
      opacity: 0.8;
      filter: brightness(1.08) saturate(1.08);
    }

    .glow-light {
      position: absolute;
      left: var(--glow-x, 50%);
      top: var(--glow-y, 50%);
      z-index: 2;
      width: min(54vw, 310px);
      aspect-ratio: 1;
      border-radius: 50%;
      background:
        radial-gradient(circle, rgba(255, 250, 205, 0.86) 0%, rgba(255, 225, 92, 0.56) 22%, rgba(255, 166, 48, 0.28) 48%, rgba(244, 112, 32, 0.1) 68%, rgba(244, 112, 32, 0) 84%);
      filter: blur(26px);
      mix-blend-mode: screen;
      opacity: 0.84;
      transform: translate(-50%, -50%);
      pointer-events: none;
      animation: glow-breathe 4.8s ease-in-out infinite;
    }

    body.is-calibrating .glow-light {
      touch-action: none;
      cursor: grab;
      pointer-events: auto;
    }

    body.is-calibrating .glow-light.is-dragging {
      cursor: grabbing;
    }

    .glow-light::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 50%;
      width: 9px;
      height: 9px;
      border: 1px solid rgba(255, 255, 255, 0.78);
      border-radius: 50%;
      box-shadow: 0 0 16px rgba(255, 244, 186, 0.9);
      transform: translate(-50%, -50%);
    }

    @keyframes glow-breathe {
      0%,
      100% {
        opacity: 0.58;
        filter: blur(28px);
        transform: translate(-50%, -50%) scale(0.92);
      }

      45% {
        opacity: 0.96;
        filter: blur(34px);
        transform: translate(-50%, -50%) scale(1.14);
      }

      68% {
        opacity: 0.76;
        filter: blur(24px);
        transform: translate(-50%, -50%) scale(1.02);
      }
    }

    .position-panel {
      position: fixed;
      left: max(16px, env(safe-area-inset-left));
      right: max(16px, env(safe-area-inset-right));
      bottom: max(16px, env(safe-area-inset-bottom));
      z-index: 5;
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px;
      width: min(560px, calc(100vw - 32px));
      padding: 10px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 16px;
      background: rgba(11, 12, 12, 0.56);
      color: rgba(255, 255, 255, 0.92);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
      font-size: 13px;
      line-height: 1.35;
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }

    .position-panel[hidden] {
      display: none;
    }

    .position-panel__modes {
      display: flex;
      flex: 0 0 100%;
      gap: 6px;
    }

    .position-panel__mode {
      flex: 1;
      min-height: 34px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.12);
      color: rgba(255, 255, 255, 0.86);
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }

    .position-panel__mode.is-active {
      background: rgba(255, 255, 255, 0.9);
      color: #151515;
    }

    .position-panel__value {
      flex: 1;
      min-width: 0;
      overflow-wrap: anywhere;
      font-variant-numeric: tabular-nums;
    }

    .position-panel__button {
      flex: 0 0 auto;
      min-height: 36px;
      padding: 0 14px;
      border: 0;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.9);
      color: #151515;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }

    .bottom-hud {
      position: fixed;
      left: 50%;
      bottom: calc(env(safe-area-inset-bottom, 0px) + var(--hud-margin));
      z-index: 6;
      display: flex;
      align-items: center;
      gap: 10px;
      max-width: calc(100vw - env(safe-area-inset-left, 0px) - env(safe-area-inset-right, 0px) - var(--hud-margin) * 2);
      transform: translateX(-50%);
    }

    .level-indicator {
      position: relative;
      z-index: 2;
      flex: 0 0 auto;
      width: var(--level-size);
      height: var(--level-size);
      --level-progress: 68;
      --level-ring-size: 201.06;
      filter: drop-shadow(0 8px 16px rgba(0, 0, 0, 0.2));
    }

    .level-indicator__ring {
      position: absolute;
      inset: 0;
      display: block;
      width: 100%;
      height: 100%;
      transform: rotate(-90deg);
      overflow: visible;
      pointer-events: none;
    }

    .level-indicator__track,
    .level-indicator__progress {
      fill: none;
      stroke-width: 3.5;
      vector-effect: non-scaling-stroke;
    }

    .level-indicator__track {
      stroke: rgba(183, 157, 95, 0.24);
    }

    .level-indicator__progress {
      stroke: rgba(183, 157, 95, 0.96);
      stroke-linecap: round;
      stroke-dasharray: var(--level-ring-size);
      stroke-dashoffset: calc(var(--level-ring-size) * (1 - var(--level-progress) / 100));
      filter: drop-shadow(0 0 6px rgba(183, 157, 95, 0.64));
    }

    .level-indicator__icon {
      position: absolute;
      left: 50%;
      top: 50%;
      display: block;
      width: 58.33%;
      height: 58.33%;
      object-fit: contain;
      transform: translate(-50%, -50%);
      user-select: none;
      pointer-events: none;
      -webkit-user-drag: none;
    }

    .secondary-menu {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      flex: 0 0 auto;
      width: min(var(--secondary-menu-width), calc(100vw - env(safe-area-inset-left, 0px) - env(safe-area-inset-right, 0px) - var(--hud-margin) * 2));
      max-width: calc(100vw - env(safe-area-inset-left, 0px) - env(safe-area-inset-right, 0px) - var(--hud-margin) * 2 - var(--level-size) * 0.46);
      height: var(--secondary-menu-height);
      margin-left: calc(var(--level-size) * -0.54 - 10px);
      padding: 0 0 0 var(--secondary-menu-lantern-reserve);
      border: 1px solid rgba(183, 157, 95, 0.58);
      border-radius: 7px;
      background:
        linear-gradient(180deg, rgba(67, 68, 58, 0.48), rgba(35, 37, 32, 0.6)),
        rgba(51, 52, 44, 0.54);
      backdrop-filter: blur(12px) saturate(1.08);
      -webkit-backdrop-filter: blur(12px) saturate(1.08);
      box-shadow:
        0 8px 18px rgba(0, 0, 0, 0.18),
        0 0 10px rgba(183, 157, 95, 0.1),
        inset 0 1px 0 rgba(255, 232, 164, 0.1),
        inset 0 -1px 0 rgba(0, 0, 0, 0.24);
    }

    .secondary-menu__content {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0;
      width: 100%;
      height: 100%;
      padding-inline: var(--secondary-menu-content-padding);
    }

    .secondary-menu__button {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      flex: 0 0 auto;
      width: auto;
      height: 100%;
      padding: 0 13px;
      border: 0;
      color: #e2ca86;
      background: transparent;
      cursor: pointer;
      font-family: "Noto Serif KR", "Apple SD Gothic Neo", serif;
      font-size: 12.5px;
      font-weight: 900;
      line-height: 1;
      white-space: nowrap;
      text-shadow: 0 1px 2px rgba(0, 0, 0, 0.68);
    }

    .secondary-menu__button + .secondary-menu__button::before {
      content: "";
      position: absolute;
      left: 0;
      top: 7px;
      bottom: 7px;
      width: 1px;
      background: rgba(183, 157, 95, 0.18);
      box-shadow: 1px 0 0 rgba(0, 0, 0, 0.08);
    }

    .secondary-menu__icon {
      display: block;
      width: 26px;
      height: 26px;
      object-fit: contain;
      filter: drop-shadow(0 1px 2px rgba(0, 0, 0, 0.58));
      user-select: none;
      pointer-events: none;
      -webkit-user-drag: none;
    }

    .secondary-menu__label {
      display: block;
      transform: translateY(-0.5px);
    }

    @media (max-width: 420px) {
      body {
        --hud-margin: 16px;
        --secondary-menu-content-padding: 14px;
      }

      .bottom-hud {
        gap: 8px;
      }

      .secondary-menu {
        margin-left: calc(var(--level-size) * -0.5 - 8px);
      }

      .secondary-menu__button {
        gap: 5px;
        padding: 0 7px;
        font-size: 13px;
      }

      .secondary-menu__icon {
        width: 27px;
        height: 27px;
      }
    }

    .sound-toggle {
      position: fixed;
      top: calc(env(safe-area-inset-top, 0px) + 22px);
      right: calc(env(safe-area-inset-right, 0px) + 22px);
      z-index: 6;
      display: grid;
      place-items: center;
      width: 38px;
      height: 38px;
      padding: 0;
      border: 0;
      background: transparent;
      cursor: pointer;
    }

    .sound-toggle__icon {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: contain;
      filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.42));
      user-select: none;
      pointer-events: none;
      -webkit-user-drag: none;
    }

  </style>
</head>
<body>
  <main class="image-stage" aria-label="background image test">
    <img class="image-stage__image" id="backgroundImage" src="images/bg_exp1.png" alt="">
    <div class="lantern-group" id="lanternGroup" aria-hidden="true">
      <img class="lantern-group__body" src="images/lantern/LANTERN-NOWINDOWS.svg" alt="">
      <img class="lantern-group__windows" src="images/lantern/WINDOWS_ONLY.svg" alt="">
    </div>
    <div class="glow-light" id="glowLight" aria-hidden="true"></div>
  </main>
  <div class="bottom-hud" aria-label="Bottom navigation">
    <div class="level-indicator" aria-label="Level progress">
      <svg class="level-indicator__ring" viewBox="0 0 72 72" aria-hidden="true">
        <circle class="level-indicator__track" cx="36" cy="36" r="32"></circle>
        <circle class="level-indicator__progress" cx="36" cy="36" r="32"></circle>
      </svg>
      <img class="level-indicator__icon" src="images/lantern/lantern_icon.svg" alt="">
    </div>
    <nav class="secondary-menu" aria-label="Secondary navigation">
      <div class="secondary-menu__content">
        <button class="secondary-menu__button" type="button" aria-label="Map">
          <img class="secondary-menu__icon" src="images/icons/icon_map.svg" alt="">
          <span class="secondary-menu__label">지도</span>
        </button>
        <button class="secondary-menu__button" type="button" aria-label="Deity">
          <img class="secondary-menu__icon" src="images/icons/icon_deity.svg" alt="">
          <span class="secondary-menu__label">만난 신</span>
        </button>
        <button class="secondary-menu__button" type="button" aria-label="Help">
          <img class="secondary-menu__icon" src="images/icons/icon_help.svg" alt="">
          <span class="secondary-menu__label">도움말</span>
        </button>
      </div>
    </nav>
  </div>
  <button class="sound-toggle" id="soundToggle" type="button" aria-label="Sound off" aria-pressed="false">
    <img class="sound-toggle__icon" id="soundToggleIcon" src="images/icons/icon_sound_off.svg" alt="">
  </button>
  <aside class="position-panel" aria-live="polite" hidden>
    <div class="position-panel__modes">
      <button class="position-panel__mode is-active" id="moveLightButton" type="button">Move light</button>
      <button class="position-panel__mode" id="moveLanternButton" type="button">Move lantern</button>
    </div>
    <span class="position-panel__value" id="positionValue"></span>
    <button class="position-panel__button" id="copyPositionButton" type="button">Copy</button>
  </aside>
  <script>
    const stage = document.querySelector(".image-stage");
    const backgroundImage = document.getElementById("backgroundImage");
    const lanternGroup = document.getElementById("lanternGroup");
    const glowLight = document.getElementById("glowLight");
    const positionValue = document.getElementById("positionValue");
    const copyPositionButton = document.getElementById("copyPositionButton");
    const moveLightButton = document.getElementById("moveLightButton");
    const moveLanternButton = document.getElementById("moveLanternButton");
    const soundToggle = document.getElementById("soundToggle");
    const soundToggleIcon = document.getElementById("soundToggleIcon");
    const calibrationEnabled = false;
    const soundIcons = {
      off: "images/icons/icon_sound_off.svg",
      on: "images/icons/icon_sound_on.svg"
    };
    let isSoundOn = false;
    let activeTarget = "light";
    const glowPosition = {
      xPercent: 50.01,
      yPercent: 62.40
    };
    const lanternPosition = {
      xPercent: 49.62,
      yPercent: 62.05
    };

    function updateViewportHeight() {
      const viewportHeight = window.visualViewport ? window.visualViewport.height : window.innerHeight;
      document.documentElement.style.setProperty("--app-height", `${viewportHeight}px`);
      updateElementsFromImagePosition();
    }

    function getRenderedImageRect() {
      const stageRect = stage.getBoundingClientRect();
      const naturalWidth = backgroundImage.naturalWidth || stageRect.width;
      const naturalHeight = backgroundImage.naturalHeight || stageRect.height;
      const scale = Math.max(stageRect.width / naturalWidth, stageRect.height / naturalHeight);
      const width = naturalWidth * scale;
      const height = naturalHeight * scale;

      return {
        left: stageRect.left + (stageRect.width - width) / 2,
        top: stageRect.top + (stageRect.height - height) / 2,
        width,
        height,
        naturalWidth,
        naturalHeight
      };
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(value, max));
    }

    function formatPosition() {
      const lightX = glowPosition.xPercent.toFixed(2);
      const lightY = glowPosition.yPercent.toFixed(2);
      const lanternX = lanternPosition.xPercent.toFixed(2);
      const lanternY = lanternPosition.yPercent.toFixed(2);
      return `--light-x: ${lightX}%; --light-y: ${lightY}%; --lantern-x: ${lanternX}%; --lantern-y: ${lanternY}%;`;
    }

    function updatePositionPanel() {
      positionValue.textContent = formatPosition();
    }

    function positionElementFromImage(element, position, xProperty, yProperty) {
      const imageRect = getRenderedImageRect();
      const x = imageRect.left + imageRect.width * position.xPercent / 100;
      const y = imageRect.top + imageRect.height * position.yPercent / 100;

      element.style.setProperty(xProperty, `${x}px`);
      element.style.setProperty(yProperty, `${y}px`);
    }

    function updateElementsFromImagePosition() {
      positionElementFromImage(glowLight, glowPosition, "--glow-x", "--glow-y");
      positionElementFromImage(lanternGroup, lanternPosition, "--lantern-x", "--lantern-y");
      updatePositionPanel();
    }

    function getActivePosition() {
      return activeTarget === "lantern" ? lanternPosition : glowPosition;
    }

    function getActiveElement() {
      return activeTarget === "lantern" ? lanternGroup : glowLight;
    }

    function setActiveTarget(target) {
      activeTarget = target;
      moveLightButton.classList.toggle("is-active", target === "light");
      moveLanternButton.classList.toggle("is-active", target === "lantern");
    }

    function setActivePositionFromPointer(event) {
      const imageRect = getRenderedImageRect();
      const position = getActivePosition();
      position.xPercent = clamp(((event.clientX - imageRect.left) / imageRect.width) * 100, 0, 100);
      position.yPercent = clamp(((event.clientY - imageRect.top) / imageRect.height) * 100, 0, 100);
      updateElementsFromImagePosition();
    }

    function handlePointerDown(event, target) {
      setActiveTarget(target);
      const element = getActiveElement();
      element.classList.add("is-dragging");
      element.setPointerCapture(event.pointerId);
      setActivePositionFromPointer(event);
    }

    function handlePointerMove(event) {
      const element = getActiveElement();
      if (!element.classList.contains("is-dragging")) return;
      setActivePositionFromPointer(event);
    }

    function handlePointerUp(event) {
      [glowLight, lanternGroup].forEach((element) => {
        element.classList.remove("is-dragging");
        if (element.hasPointerCapture(event.pointerId)) {
          element.releasePointerCapture(event.pointerId);
        }
      });
    }

    function handleStagePointerDown(event) {
      if (event.target === glowLight || lanternGroup.contains(event.target)) {
        return;
      }
      setActivePositionFromPointer(event);
    }

    async function copyPosition() {
      const value = formatPosition();

      try {
        await navigator.clipboard.writeText(value);
        copyPositionButton.textContent = "Copied";
        window.setTimeout(() => {
          copyPositionButton.textContent = "Copy";
        }, 900);
      } catch {
        positionValue.textContent = value;
      }
    }

    function updateSoundToggle() {
      if (!soundToggle || !soundToggleIcon) return;

      soundToggleIcon.src = isSoundOn ? soundIcons.on : soundIcons.off;
      soundToggle.setAttribute("aria-pressed", String(isSoundOn));
      soundToggle.setAttribute("aria-label", isSoundOn ? "Sound on" : "Sound off");
    }

    function toggleSound() {
      isSoundOn = !isSoundOn;
      updateSoundToggle();
    }

    updateViewportHeight();

    if (window.visualViewport) {
      window.visualViewport.addEventListener("resize", updateViewportHeight);
    }

    window.addEventListener("resize", updateViewportHeight);
    window.addEventListener("orientationchange", updateViewportHeight);
    backgroundImage.addEventListener("load", updateElementsFromImagePosition);
    if (calibrationEnabled) {
      document.body.classList.add("is-calibrating");
      document.querySelector(".position-panel").hidden = false;
      stage.addEventListener("pointerdown", handleStagePointerDown);
      glowLight.addEventListener("pointerdown", (event) => handlePointerDown(event, "light"));
      glowLight.addEventListener("pointermove", handlePointerMove);
      glowLight.addEventListener("pointerup", handlePointerUp);
      glowLight.addEventListener("pointercancel", handlePointerUp);
      lanternGroup.addEventListener("pointerdown", (event) => handlePointerDown(event, "lantern"));
      lanternGroup.addEventListener("pointermove", handlePointerMove);
      lanternGroup.addEventListener("pointerup", handlePointerUp);
      lanternGroup.addEventListener("pointercancel", handlePointerUp);
      moveLightButton.addEventListener("click", () => setActiveTarget("light"));
      moveLanternButton.addEventListener("click", () => setActiveTarget("lantern"));
      copyPositionButton.addEventListener("click", copyPosition);
    }

    soundToggle?.addEventListener("click", toggleSound);
  </script>
</body>
</html>
