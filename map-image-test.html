<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#ecebe6">
  <title>Jeju Map Image Test Cycle</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="map-image-page scene-loading" data-scene-mode="test-cycle">
  <div class="loading-screen" id="loadingScreen" aria-live="polite">
    <div class="loading-screen__bar">
      <span class="loading-screen__fill" id="loadingBarFill"></span>
    </div>
  </div>
  <div class="app-shell app-shell--image">
    <main class="map-screen map-screen--image">
      <div class="map-stage map-stage--image" id="mapStage">
        <img
          class="map-image"
          id="mapImagePrimary"
          alt="Jeju game map test"
        >
        <img
          class="map-image"
          id="mapImageSecondary"
          alt=""
          aria-hidden="true"
        >
        <div class="cloud-layer cloud-layer--bottom" id="bottomCloudLayer" aria-hidden="true"></div>
        <div class="cloud-layer" id="cloudLayer" aria-hidden="true"></div>
      </div>
    </main>
  </div>
  <audio id="mapBackgroundAudio" preload="auto" loop playsinline webkit-playsinline>
    <source src="sound/map_background.mp3" type="audio/mpeg">
  </audio>
  <script type="module" src="scripts/map-image.js"></script>
</body>
</html>
